<div class="toast-wrapper position-fixed top-0 end-0 p-3 d-flex flex-column gap-2" style="z-index: 9999; pointer-events: none;">
  @for (toast of toasts; track toast.id) {
    <div class="toast-item d-flex align-items-center bg-white rounded-3 shadow position-relative overflow-hidden"
         [class.toast-item--success]="toast.type === 'success'"
         [class.toast-item--error]="toast.type === 'error'"
         [class.toast-item--warning]="toast.type === 'warning'"
         [class.toast-item--info]="toast.type === 'info'"
         style="pointer-events: auto;">
      <div class="toast-border"></div>
      <div class="toast-icon d-flex align-items-center justify-content-center flex-shrink-0 ms-3 me-2" [innerHTML]="getIcon(toast.type)"></div>
      <div class="toast-msg flex-grow-1 small fw-medium text-dark py-3 pe-5">{{ toast.message }}</div>
      <button class="btn-close btn-close-sm position-absolute top-0 end-0 mt-2 me-2" (click)="remove(toast.id)" aria-label="Close notification"></button>
      <div class="toast-progress" [style.animation-duration]="toast.duration + 'ms'"></div>
    </div>
  }
</div>
