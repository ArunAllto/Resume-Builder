<div class="toast-container">
  @for (toast of toasts; track toast.id) {
    <div class="toast" [class]="'toast--' + toast.type">
      <div class="toast__border"></div>
      <div class="toast__icon" [innerHTML]="getIcon(toast.type)"></div>
      <div class="toast__message">{{ toast.message }}</div>
      <button class="toast__close" (click)="remove(toast.id)" aria-label="Close notification">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="toast__progress" [style.animation-duration]="toast.duration + 'ms'"></div>
    </div>
  }
</div>
