@if (visible) {
<div class="auth-overlay" (click)="close()">
  <div class="auth-card" (click)="$event.stopPropagation()">
    <!-- Close button -->
    <button class="auth-close" (click)="close()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>

    <!-- Logo -->
    <div class="auth-logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3f7cfe" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>ResumeAI</span>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button [class.active]="activeTab === 'login'" (click)="activeTab = 'login'; error = ''">Login</button>
      <button [class.active]="activeTab === 'register'" (click)="activeTab = 'register'; error = ''">Register</button>
    </div>

    <!-- Error -->
    @if (error) {
      <div class="auth-error">{{ error }}</div>
    }

    <!-- Login Form -->
    @if (activeTab === 'login') {
      <form (ngSubmit)="onLogin()">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" [(ngModel)]="loginEmail" name="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" [(ngModel)]="loginPassword" name="password" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button type="submit" class="auth-btn" [disabled]="loading">
          @if (loading) { <span class="spinner"></span> } @else { Login }
        </button>
      </form>
    }

    <!-- Register Form -->
    @if (activeTab === 'register') {
      <form (ngSubmit)="onRegister()">
        <div class="auth-field">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="regName" name="name" placeholder="John Doe" autocomplete="name">
        </div>
        <div class="auth-field">
          <label>Email</label>
          <input type="email" [(ngModel)]="regEmail" name="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" [(ngModel)]="regPassword" name="password" placeholder="Min 6 characters" autocomplete="new-password">
        </div>
        <div class="auth-field">
          <label>Confirm Password</label>
          <input type="password" [(ngModel)]="regConfirmPassword" name="confirmPassword" placeholder="Re-enter password" autocomplete="new-password">
        </div>
        <button type="submit" class="auth-btn" [disabled]="loading">
          @if (loading) { <span class="spinner"></span> } @else { Create Account }
        </button>
      </form>
    }

    <!-- Divider -->
    <div class="auth-divider"><span>or</span></div>

    <!-- Google Button -->
    <button class="google-btn" (click)="onGoogleSignIn()" [disabled]="loading">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>

    <p class="auth-footer">
      @if (activeTab === 'login') {
        Don't have an account? <a (click)="activeTab = 'register'; error = ''">Register</a>
      } @else {
        Already have an account? <a (click)="activeTab = 'login'; error = ''">Login</a>
      }
    </p>
  </div>
</div>
}
