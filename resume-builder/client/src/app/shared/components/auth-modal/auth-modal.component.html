@if (visible) {
<div class="modal d-flex align-items-center justify-content-center show auth-overlay" (click)="close()">
  <div class="modal-dialog m-0" style="max-width: 420px; width: 90%;" (click)="$event.stopPropagation()">
    <div class="modal-content border-0 rounded-4 shadow-lg p-4 position-relative auth-card-animate">
      <!-- Close button -->
      <button class="btn-close position-absolute top-0 end-0 mt-3 me-3" (click)="close()" aria-label="Close"></button>

      <!-- Logo -->
      <div class="d-flex align-items-center justify-content-center gap-2 mb-4">
        <i class="bi bi-file-earmark-text fs-3 text-primary"></i>
        <span class="fs-5 fw-bold text-dark">ResumeAI</span>
      </div>

      <!-- Tabs -->
      <ul class="nav nav-tabs mb-3">
        <li class="nav-item flex-fill text-center">
          <a class="nav-link" [class.active]="activeTab === 'login'" (click)="activeTab = 'login'; error = ''" role="button">Login</a>
        </li>
        <li class="nav-item flex-fill text-center">
          <a class="nav-link" [class.active]="activeTab === 'register'" (click)="activeTab = 'register'; error = ''" role="button">Register</a>
        </li>
      </ul>

      <!-- Error -->
      @if (error) {
        <div class="alert alert-danger py-2 px-3 small mb-3">{{ error }}</div>
      }

      <!-- Login Form -->
      @if (activeTab === 'login') {
        <form (ngSubmit)="onLogin()">
          <div class="mb-3">
            <label class="form-label small fw-medium">Email</label>
            <input type="email" class="form-control" [(ngModel)]="loginEmail" name="email" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-medium">Password</label>
            <input type="password" class="form-control" [(ngModel)]="loginPassword" name="password" placeholder="Enter your password" autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold d-flex align-items-center justify-content-center gap-2" [disabled]="loading">
            @if (loading) { <span class="spinner-border spinner-border-sm"></span> } @else { Login }
          </button>
        </form>
      }

      <!-- Register Form -->
      @if (activeTab === 'register') {
        <form (ngSubmit)="onRegister()">
          <div class="mb-3">
            <label class="form-label small fw-medium">Full Name</label>
            <input type="text" class="form-control" [(ngModel)]="regName" name="name" placeholder="John Doe" autocomplete="name">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-medium">Email</label>
            <input type="email" class="form-control" [(ngModel)]="regEmail" name="email" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-medium">Password</label>
            <input type="password" class="form-control" [(ngModel)]="regPassword" name="password" placeholder="Min 6 characters" autocomplete="new-password">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-medium">Confirm Password</label>
            <input type="password" class="form-control" [(ngModel)]="regConfirmPassword" name="confirmPassword" placeholder="Re-enter password" autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold d-flex align-items-center justify-content-center gap-2" [disabled]="loading">
            @if (loading) { <span class="spinner-border spinner-border-sm"></span> } @else { Create Account }
          </button>
        </form>
      }

      <!-- Divider -->
      <div class="d-flex align-items-center my-3 auth-divider">
        <hr class="flex-grow-1">
        <span class="px-3 text-secondary small">or</span>
        <hr class="flex-grow-1">
      </div>

      <!-- Google Button -->
      <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 fw-medium" (click)="onGoogleSignIn()" [disabled]="loading">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>

      <p class="text-center mt-3 mb-0 small text-secondary">
        @if (activeTab === 'login') {
          Don't have an account? <a class="text-primary fw-medium" role="button" (click)="activeTab = 'register'; error = ''">Register</a>
        } @else {
          Already have an account? <a class="text-primary fw-medium" role="button" (click)="activeTab = 'login'; error = ''">Login</a>
        }
      </p>
    </div>
  </div>
</div>
}
