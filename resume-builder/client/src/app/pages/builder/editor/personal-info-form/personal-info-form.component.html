<div>
  <h3 class="fs-6 fw-bold text-dark mb-3 d-flex align-items-center gap-2">
    <i class="bi bi-person text-primary"></i>
    Personal Information
  </h3>

  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label small fw-semibold text-secondary" for="fullName">Full Name</label>
      <input
        id="fullName"
        type="text"
        class="form-control"
        placeholder="John Doe"
        [(ngModel)]="data.fullName"
        (ngModelChange)="onFieldChange()" />
    </div>

    <div class="col-md-6">
      <label class="form-label small fw-semibold text-secondary" for="email">Email Address</label>
      <input
        id="email"
        type="email"
        class="form-control"
        placeholder="john@example.com"
        [(ngModel)]="data.email"
        (ngModelChange)="onFieldChange()" />
    </div>

    <div class="col-md-6">
      <label class="form-label small fw-semibold text-secondary" for="phone">Phone Number</label>
      <input
        id="phone"
        type="tel"
        class="form-control"
        placeholder="+1 (555) 123-4567"
        [(ngModel)]="data.phone"
        (ngModelChange)="onFieldChange()" />
    </div>

    <div class="col-md-6">
      <label class="form-label small fw-semibold text-secondary" for="location">Location</label>
      <input
        id="location"
        type="text"
        class="form-control"
        placeholder="San Francisco, CA"
        [(ngModel)]="data.location"
        (ngModelChange)="onFieldChange()" />
    </div>

    <div class="col-md-6">
      <label class="form-label small fw-semibold text-secondary" for="linkedin">LinkedIn</label>
      <input
        id="linkedin"
        type="url"
        class="form-control"
        placeholder="linkedin.com/in/johndoe"
        [(ngModel)]="data.linkedin"
        (ngModelChange)="onFieldChange()" />
    </div>

    <div class="col-md-6">
      <label class="form-label small fw-semibold text-secondary" for="website">Website</label>
      <input
        id="website"
        type="url"
        class="form-control"
        placeholder="johndoe.com"
        [(ngModel)]="data.website"
        (ngModelChange)="onFieldChange()" />
    </div>
  </div>
</div>
