<div class="d-flex flex-column h-100 bg-light border-start live-preview-panel">
  <div class="d-flex align-items-center justify-content-between px-3 py-2 bg-white border-bottom flex-shrink-0">
    <div class="d-flex align-items-center gap-2">
      <label class="form-label small fw-semibold text-secondary mb-0 text-nowrap">Template:</label>
      <select class="form-select form-select-sm" style="width: auto;" [(ngModel)]="activeTemplate">
        @for (opt of templateOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>
    <div class="d-flex align-items-center gap-1 bg-light rounded p-1 zoom-controls">
      <button class="btn btn-sm btn-light d-flex align-items-center justify-content-center zoom-btn" (click)="zoomOut()" [disabled]="zoomLevel <= 0.25" title="Zoom out">
        <i class="bi bi-zoom-out"></i>
      </button>
      <span class="small fw-semibold text-secondary text-center zoom-label" (click)="resetZoom()">{{ zoomPercent }}%</span>
      <button class="btn btn-sm btn-light d-flex align-items-center justify-content-center zoom-btn" (click)="zoomIn()" [disabled]="zoomLevel >= 1.0" title="Zoom in">
        <i class="bi bi-zoom-in"></i>
      </button>
    </div>
  </div>

  <div class="flex-fill overflow-auto p-4 d-flex justify-content-center preview-scroll-area">
    @if (isCanvasTemplate && canvasTemplateData) {
      <div class="canvas-wrapper" [style.transform-origin]="'top center'">
        <app-template-renderer
          [templateData]="canvasTemplateData"
          [resumeData]="data"
          [scale]="zoomLevel"
        ></app-template-renderer>
      </div>
    } @else {
      <div class="a4-wrapper" [style.transform]="'scale(' + zoomLevel + ')'"
        [style.transform-origin]="'top center'">
        @switch (activeTemplate) {
          @case ('professional') {
            <app-professional-template [data]="data"></app-professional-template>
          }
          @case ('modern') {
            <app-modern-template [data]="data"></app-modern-template>
          }
          @case ('minimal') {
            <app-minimal-template [data]="data"></app-minimal-template>
          }
          @case ('creative') {
            <app-creative-template [data]="data"></app-creative-template>
          }
          @default {
            <app-professional-template [data]="data"></app-professional-template>
          }
        }
      </div>
    }
  </div>
</div>
