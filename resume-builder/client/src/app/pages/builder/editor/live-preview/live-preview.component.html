<div class="live-preview-panel">
  <div class="preview-toolbar">
    <div class="toolbar-left">
      <label class="template-label">Template:</label>
      <select class="template-select" [(ngModel)]="activeTemplate">
        @for (opt of templateOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>
    <div class="toolbar-right">
      <div class="zoom-controls">
        <button class="zoom-btn" (click)="zoomOut()" [disabled]="zoomLevel <= 0.25" title="Zoom out">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </button>
        <span class="zoom-label" (click)="resetZoom()">{{ zoomPercent }}%</span>
        <button class="zoom-btn" (click)="zoomIn()" [disabled]="zoomLevel >= 1.0" title="Zoom in">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="11" y1="8" x2="11" y2="14"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="preview-scroll-area">
    @if (isCanvasTemplate && canvasTemplateData) {
      <div class="canvas-wrapper" [style.transform-origin]="'top center'">
        <app-template-renderer
          [templateData]="canvasTemplateData"
          [resumeData]="data"
          [scale]="zoomLevel"
        ></app-template-renderer>
      </div>
    } @else {
      <div class="a4-wrapper" [style.transform]="'scale(' + zoomLevel + ')'"
        [style.transform-origin]="'top center'">
        @switch (activeTemplate) {
          @case ('professional') {
            <app-professional-template [data]="data"></app-professional-template>
          }
          @case ('modern') {
            <app-modern-template [data]="data"></app-modern-template>
          }
          @case ('minimal') {
            <app-minimal-template [data]="data"></app-minimal-template>
          }
          @case ('creative') {
            <app-creative-template [data]="data"></app-creative-template>
          }
          @default {
            <app-professional-template [data]="data"></app-professional-template>
          }
        }
      </div>
    }
  </div>
</div>
