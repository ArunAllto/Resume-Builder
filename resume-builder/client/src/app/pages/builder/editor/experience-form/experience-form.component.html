<div>
  <div class="d-flex align-items-center justify-content-between mb-3 section-header">
    <h3 class="fs-6 fw-bold text-dark mb-0 d-flex align-items-center gap-2">
      <i class="bi bi-briefcase text-primary"></i>
      Work Experience
    </h3>
    <button class="btn btn-primary btn-sm d-inline-flex align-items-center gap-1" (click)="addExperience()">
      <i class="bi bi-plus-lg"></i>
      Add Experience
    </button>
  </div>

  @if (data.length === 0) {
    <div class="text-center text-muted py-4 px-3 bg-light rounded border border-dashed">
      <p class="mb-0">No work experience added yet. Click "Add Experience" to get started.</p>
    </div>
  }

  <div class="d-flex flex-column gap-3">
    @for (exp of data; track exp.id; let i = $index) {
      <div class="card border" [class.shadow-sm]="expandedIndex === i">
        <div class="card-header bg-white d-flex align-items-center justify-content-between px-3 py-3 entry-header" (click)="toggleExpand(i)">
          <div class="d-flex align-items-center gap-2 min-w-0 flex-fill">
            <i class="bi bi-chevron-down text-muted chevron" [class.collapsed]="expandedIndex !== i"></i>
            <span class="fw-semibold small text-dark text-truncate">{{ getEntryTitle(exp) }}</span>
          </div>
          <button class="btn btn-sm text-muted flex-shrink-0 remove-btn" (click)="removeExperience(i); $event.stopPropagation()" title="Remove">
            <i class="bi bi-trash"></i>
          </button>
        </div>

        @if (expandedIndex === i) {
          <div class="card-body border-top">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label small fw-semibold text-secondary">Company</label>
                <input type="text" class="form-control" placeholder="Google, Inc."
                  [(ngModel)]="exp.company" (ngModelChange)="emitChange()" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold text-secondary">Position</label>
                <input type="text" class="form-control" placeholder="Senior Software Engineer"
                  [(ngModel)]="exp.position" (ngModelChange)="emitChange()" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold text-secondary">Location</label>
                <input type="text" class="form-control" placeholder="Mountain View, CA"
                  [(ngModel)]="exp.location" (ngModelChange)="emitChange()" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold text-secondary">Start Date</label>
                <input type="month" class="form-control"
                  [(ngModel)]="exp.startDate" (ngModelChange)="emitChange()" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold text-secondary">End Date</label>
                <input type="month" class="form-control"
                  [(ngModel)]="exp.endDate" (ngModelChange)="emitChange()"
                  [disabled]="exp.current" />
              </div>
              <div class="col-md-6 d-flex align-items-end">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" [id]="'current-' + i"
                    [(ngModel)]="exp.current" (ngModelChange)="onCurrentChange(i)" />
                  <label class="form-check-label small text-secondary" [for]="'current-' + i">
                    Currently working here
                  </label>
                </div>
              </div>
            </div>

            <div class="mt-3">
              <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
                <label class="form-label small fw-semibold text-secondary mb-0">Description</label>
                <button class="btn btn-sm ai-btn" (click)="enhanceDescription(i)"
                  [disabled]="enhancingIndex === i || !exp.description.trim()">
                  @if (enhancingIndex === i) {
                    <span class="spinner-border spinner-border-sm me-1"></span>
                    Enhancing...
                  } @else {
                    <i class="bi bi-lightning-fill me-1"></i>
                    AI Enhance
                  }
                </button>
              </div>
              <textarea class="form-control" rows="3"
                placeholder="Describe your role and responsibilities..."
                [(ngModel)]="exp.description" (ngModelChange)="emitChange()"></textarea>
            </div>

            <div class="mt-3">
              <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
                <label class="form-label small fw-semibold text-secondary mb-0">Key Highlights</label>
                <button class="btn btn-outline-primary btn-sm d-inline-flex align-items-center gap-1" (click)="addHighlight(i)">
                  <i class="bi bi-plus"></i> Add
                </button>
              </div>
              @for (hl of exp.highlights; track $index; let hi = $index) {
                <div class="d-flex align-items-center gap-2 mb-2">
                  <span class="highlight-bullet flex-shrink-0"></span>
                  <input type="text" class="form-control form-control-sm flex-fill"
                    placeholder="Achieved X by doing Y resulting in Z..."
                    [ngModel]="hl"
                    (ngModelChange)="updateHighlight(i, hi, $event)" />
                  <button class="btn btn-sm text-muted p-1 flex-shrink-0 remove-small-btn" (click)="removeHighlight(i, hi)" title="Remove">
                    <i class="bi bi-x-lg small"></i>
                  </button>
                </div>
              }
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
