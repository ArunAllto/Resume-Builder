<div class="form-section">
  <div class="section-header">
    <h3 class="section-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
        <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path>
      </svg>
      Education
    </h3>
    <button class="add-btn" (click)="addEducation()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Add Education
    </button>
  </div>

  @if (data.length === 0) {
    <div class="empty-entries">
      <p>No education entries added yet. Click "Add Education" to get started.</p>
    </div>
  }

  <div class="entries-list">
    @for (edu of data; track edu.id; let i = $index) {
      <div class="entry-card" [class.expanded]="expandedIndex === i">
        <div class="entry-header" (click)="toggleExpand(i)">
          <div class="entry-header-left">
            <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
            <span class="entry-title">{{ getEntryTitle(edu) }}</span>
          </div>
          <button class="remove-btn" (click)="removeEducation(i); $event.stopPropagation()" title="Remove">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
        </div>

        @if (expandedIndex === i) {
          <div class="entry-body">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Institution</label>
                <input type="text" class="form-input" placeholder="Massachusetts Institute of Technology"
                  [(ngModel)]="edu.institution" (ngModelChange)="emitChange()" />
              </div>
              <div class="form-group">
                <label class="form-label">Degree</label>
                <input type="text" class="form-input" placeholder="Bachelor of Science"
                  [(ngModel)]="edu.degree" (ngModelChange)="emitChange()" />
              </div>
              <div class="form-group">
                <label class="form-label">Field of Study</label>
                <input type="text" class="form-input" placeholder="Computer Science"
                  [(ngModel)]="edu.field" (ngModelChange)="emitChange()" />
              </div>
              <div class="form-group">
                <label class="form-label">Location</label>
                <input type="text" class="form-input" placeholder="Cambridge, MA"
                  [(ngModel)]="edu.location" (ngModelChange)="emitChange()" />
              </div>
              <div class="form-group">
                <label class="form-label">Start Date</label>
                <input type="month" class="form-input"
                  [(ngModel)]="edu.startDate" (ngModelChange)="emitChange()" />
              </div>
              <div class="form-group">
                <label class="form-label">End Date</label>
                <input type="month" class="form-input"
                  [(ngModel)]="edu.endDate" (ngModelChange)="emitChange()" />
              </div>
              <div class="form-group">
                <label class="form-label">GPA</label>
                <input type="text" class="form-input" placeholder="3.8 / 4.0"
                  [(ngModel)]="edu.gpa" (ngModelChange)="emitChange()" />
              </div>
            </div>

            <div class="highlights-section">
              <div class="label-row">
                <label class="form-label">Highlights / Activities</label>
                <button class="add-small-btn" (click)="addHighlight(i)">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                  </svg>
                  Add
                </button>
              </div>
              @for (hl of edu.highlights; track $index; let hi = $index) {
                <div class="highlight-row">
                  <span class="highlight-bullet"></span>
                  <input type="text" class="form-input highlight-input"
                    placeholder="Dean's List, Relevant Coursework, Activities..."
                    [ngModel]="hl"
                    (ngModelChange)="updateHighlight(i, hi, $event)" />
                  <button class="remove-small-btn" (click)="removeHighlight(i, hi)" title="Remove">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <line x1="18" y1="6" x2="6" y2="18"></line>
                      <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                  </button>
                </div>
              }
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
