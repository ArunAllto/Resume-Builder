<div>
  <div class="d-flex align-items-center justify-content-between mb-3 section-header">
    <h3 class="fs-6 fw-bold text-dark mb-0 d-flex align-items-center gap-2">
      <i class="bi bi-mortarboard text-primary"></i>
      Education
    </h3>
    <button class="btn btn-primary btn-sm d-inline-flex align-items-center gap-1" (click)="addEducation()">
      <i class="bi bi-plus-lg"></i>
      Add Education
    </button>
  </div>

  @if (data.length === 0) {
    <div class="text-center text-muted py-4 px-3 bg-light rounded border border-dashed">
      <p class="mb-0">No education entries added yet. Click "Add Education" to get started.</p>
    </div>
  }

  <div class="d-flex flex-column gap-3">
    @for (edu of data; track edu.id; let i = $index) {
      <div class="card border" [class.shadow-sm]="expandedIndex === i">
        <div class="card-header bg-white d-flex align-items-center justify-content-between px-3 py-3 entry-header" (click)="toggleExpand(i)">
          <div class="d-flex align-items-center gap-2 min-w-0 flex-fill">
            <i class="bi bi-chevron-down text-muted chevron" [class.collapsed]="expandedIndex !== i"></i>
            <span class="fw-semibold small text-dark text-truncate">{{ getEntryTitle(edu) }}</span>
          </div>
          <button class="btn btn-sm text-muted flex-shrink-0 remove-btn" (click)="removeEducation(i); $event.stopPropagation()" title="Remove">
            <i class="bi bi-trash"></i>
          </button>
        </div>

        @if (expandedIndex === i) {
          <div class="card-body border-top">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label small fw-semibold text-secondary">Institution</label>
                <input type="text" class="form-control" placeholder="Massachusetts Institute of Technology"
                  [(ngModel)]="edu.institution" (ngModelChange)="emitChange()" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold text-secondary">Degree</label>
                <input type="text" class="form-control" placeholder="Bachelor of Science"
                  [(ngModel)]="edu.degree" (ngModelChange)="emitChange()" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold text-secondary">Field of Study</label>
                <input type="text" class="form-control" placeholder="Computer Science"
                  [(ngModel)]="edu.field" (ngModelChange)="emitChange()" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold text-secondary">Location</label>
                <input type="text" class="form-control" placeholder="Cambridge, MA"
                  [(ngModel)]="edu.location" (ngModelChange)="emitChange()" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold text-secondary">Start Date</label>
                <input type="month" class="form-control"
                  [(ngModel)]="edu.startDate" (ngModelChange)="emitChange()" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold text-secondary">End Date</label>
                <input type="month" class="form-control"
                  [(ngModel)]="edu.endDate" (ngModelChange)="emitChange()" />
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-semibold text-secondary">GPA</label>
                <input type="text" class="form-control" placeholder="3.8 / 4.0"
                  [(ngModel)]="edu.gpa" (ngModelChange)="emitChange()" />
              </div>
            </div>

            <div class="mt-3">
              <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
                <label class="form-label small fw-semibold text-secondary mb-0">Highlights / Activities</label>
                <button class="btn btn-outline-primary btn-sm d-inline-flex align-items-center gap-1" (click)="addHighlight(i)">
                  <i class="bi bi-plus"></i> Add
                </button>
              </div>
              @for (hl of edu.highlights; track $index; let hi = $index) {
                <div class="d-flex align-items-center gap-2 mb-2">
                  <span class="highlight-bullet flex-shrink-0"></span>
                  <input type="text" class="form-control form-control-sm flex-fill"
                    placeholder="Dean's List, Relevant Coursework, Activities..."
                    [ngModel]="hl"
                    (ngModelChange)="updateHighlight(i, hi, $event)" />
                  <button class="btn btn-sm text-muted p-1 flex-shrink-0 remove-small-btn" (click)="removeHighlight(i, hi)" title="Remove">
                    <i class="bi bi-x-lg small"></i>
                  </button>
                </div>
              }
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
