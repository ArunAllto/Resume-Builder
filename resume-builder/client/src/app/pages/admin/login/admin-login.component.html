<div class="login-page d-flex align-items-center justify-content-center min-vh-100 p-4">
  <div class="card shadow-lg border-0 login-card">
    <div class="card-body p-4 p-sm-5">
      <!-- Header -->
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center rounded-3 bg-primary-subtle text-primary mb-3 logo-icon">
          <i class="bi bi-file-earmark-text fs-3"></i>
        </div>
        <h1 class="fs-4 fw-bold text-dark mb-1">Admin Panel</h1>
        <p class="text-secondary small mb-0">Sign in to manage your resume builder</p>
      </div>

      <!-- Error Banner -->
      @if (errorMessage) {
        <div class="alert alert-danger d-flex align-items-center gap-2 py-2 px-3 small fw-medium" role="alert">
          <i class="bi bi-exclamation-circle"></i>
          {{ errorMessage }}
        </div>
      }

      <!-- Login Form -->
      <form (ngSubmit)="login()" class="d-flex flex-column gap-3">
        <div>
          <label for="email" class="form-label small fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-white">
              <i class="bi bi-envelope text-secondary"></i>
            </span>
            <input
              id="email"
              type="email"
              class="form-control"
              [(ngModel)]="email"
              name="email"
              placeholder="admin@example.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div>
          <label for="password" class="form-label small fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-white">
              <i class="bi bi-lock text-secondary"></i>
            </span>
            <input
              id="password"
              type="password"
              class="form-control"
              [(ngModel)]="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold d-flex align-items-center justify-content-center gap-2 mt-1" [disabled]="isLoading">
          @if (isLoading) {
            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            Signing in...
          } @else {
            Sign In
          }
        </button>
      </form>

      <!-- Footer -->
      <div class="text-center mt-4 pt-3 border-top">
        <a routerLink="/" class="text-secondary text-decoration-none small fw-medium d-inline-flex align-items-center gap-1 link-hover">
          <i class="bi bi-arrow-left"></i>
          Back to Site
        </a>
      </div>
    </div>
  </div>
</div>
