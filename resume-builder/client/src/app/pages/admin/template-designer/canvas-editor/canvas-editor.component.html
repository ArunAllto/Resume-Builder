<div class="canvas-wrapper" #canvasWrapper>
  <!-- Top ruler -->
  <div class="ruler ruler-horizontal">
    @for (tick of [0,50,100,150,200,250,300,350,400,450,500,550]; track tick) {
      <span class="ruler-tick" [style.left.px]="tick * 0.75 + 30">{{ tick }}</span>
    }
  </div>

  <!-- Left ruler -->
  <div class="ruler ruler-vertical">
    @for (tick of [0,50,100,150,200,250,300,350,400,450,500,550,600,650,700,750,800]; track tick) {
      <span class="ruler-tick" [style.top.px]="tick * 0.75 + 30">{{ tick }}</span>
    }
  </div>

  <!-- Canvas element -->
  <canvas #fabricCanvas></canvas>
</div>
