<div class="admin-layout" [class.collapsed]="sidebarCollapsed">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
        </svg>
        @if (!sidebarCollapsed) {
          <span class="brand-text">Resume Admin</span>
        }
      </div>
      <button class="collapse-btn" (click)="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          @if (sidebarCollapsed) {
            <polyline points="9 18 15 12 9 6"></polyline>
          } @else {
            <polyline points="15 18 9 12 15 6"></polyline>
          }
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        @if (!sidebarCollapsed) {
          <span>Dashboard</span>
        }
      </a>
      <a routerLink="/admin/templates" routerLinkActive="active" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="3" y1="9" x2="21" y2="9"></line>
          <line x1="9" y1="21" x2="9" y2="9"></line>
        </svg>
        @if (!sidebarCollapsed) {
          <span>Templates</span>
        }
      </a>
      <a routerLink="/admin/templates/designer" routerLinkActive="active" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 20h9"></path>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
        </svg>
        @if (!sidebarCollapsed) {
          <span>Template Designer</span>
        }
      </a>
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/" class="nav-item footer-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          <polyline points="15 3 21 3 21 9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
        @if (!sidebarCollapsed) {
          <span>View Site</span>
        }
      </a>

      <div class="user-section">
        <div class="user-avatar">
          {{ adminEmail.charAt(0).toUpperCase() }}
        </div>
        @if (!sidebarCollapsed) {
          <div class="user-info">
            <span class="user-email">{{ adminEmail }}</span>
            <button class="logout-btn" (click)="logout()">Sign Out</button>
          </div>
        }
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
