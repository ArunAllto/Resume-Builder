<section class="py-5 bg-body-secondary">
  <div class="container py-lg-4">
    <!-- Section Header -->
    <div class="text-center mx-auto mb-5" style="max-width: 640px;">
      <span class="d-inline-block small fw-semibold text-primary text-uppercase mb-2"
            style="letter-spacing: 0.1em;">Features</span>
      <h2 class="display-6 fw-bold text-dark lh-sm mb-3">Everything You Need</h2>
      <p class="fs-5 text-muted">
        Powerful tools and AI technology that make resume building effortless and effective.
      </p>
    </div>

    <!-- Features Grid: 3x2 -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      @for (feature of features; track feature.title) {
        <div class="col">
          <div class="card h-100 border rounded-4 p-4 feature-card">
            <div class="feature-icon d-flex align-items-center justify-content-center rounded-3 mb-3"
                 [style.background]="feature.color + '14'"
                 [style.color]="feature.color">
              <i class="bi {{ feature.icon }} fs-4"></i>
            </div>
            <h3 class="fs-5 fw-bold text-dark mb-2">{{ feature.title }}</h3>
            <p class="text-muted mb-0" style="font-size: 0.925rem; line-height: 1.7;">
              {{ feature.description }}
            </p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
