<div class="form-section">
  <div class="section-header">
    <h3 class="section-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
      </svg>
      Work Experience
    </h3>
    <button class="add-btn" (click)="addExperience()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Add Experience
    </button>
  </div>

  @if (data.length === 0) {
    <div class="empty-entries">
      <p>No work experience added yet. Click "Add Experience" to get started.</p>
    </div>
  }

  <div class="entries-list">
    @for (exp of data; track exp.id; let i = $index) {
      <div class="entry-card" [class.expanded]="expandedIndex === i">
        <div class="entry-header" (click)="toggleExpand(i)">
          <div class="entry-header-left">
            <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
            <span class="entry-title">{{ getEntryTitle(exp) }}</span>
          </div>
          <button class="remove-btn" (click)="removeExperience(i); $event.stopPropagation()" title="Remove">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
        </div>

        @if (expandedIndex === i) {
          <div class="entry-body">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Company</label>
                <input type="text" class="form-input" placeholder="Google, Inc."
                  [(ngModel)]="exp.company" (ngModelChange)="emitChange()" />
              </div>
              <div class="form-group">
                <label class="form-label">Position</label>
                <input type="text" class="form-input" placeholder="Senior Software Engineer"
                  [(ngModel)]="exp.position" (ngModelChange)="emitChange()" />
              </div>
              <div class="form-group">
                <label class="form-label">Location</label>
                <input type="text" class="form-input" placeholder="Mountain View, CA"
                  [(ngModel)]="exp.location" (ngModelChange)="emitChange()" />
              </div>
              <div class="form-group">
                <label class="form-label">Start Date</label>
                <input type="month" class="form-input"
                  [(ngModel)]="exp.startDate" (ngModelChange)="emitChange()" />
              </div>
              <div class="form-group">
                <label class="form-label">End Date</label>
                <input type="month" class="form-input"
                  [(ngModel)]="exp.endDate" (ngModelChange)="emitChange()"
                  [disabled]="exp.current" />
              </div>
              <div class="form-group checkbox-group">
                <label class="checkbox-label">
                  <input type="checkbox"
                    [(ngModel)]="exp.current" (ngModelChange)="onCurrentChange(i)" />
                  <span class="checkmark"></span>
                  Currently working here
                </label>
              </div>
            </div>

            <div class="form-group full-width">
              <div class="label-row">
                <label class="form-label">Description</label>
                <button class="ai-btn" (click)="enhanceDescription(i)"
                  [disabled]="enhancingIndex === i || !exp.description.trim()">
                  @if (enhancingIndex === i) {
                    <span class="ai-spinner"></span>
                    Enhancing...
                  } @else {
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                    </svg>
                    AI Enhance
                  }
                </button>
              </div>
              <textarea class="form-textarea" rows="3"
                placeholder="Describe your role and responsibilities..."
                [(ngModel)]="exp.description" (ngModelChange)="emitChange()"></textarea>
            </div>

            <div class="highlights-section">
              <div class="label-row">
                <label class="form-label">Key Highlights</label>
                <button class="add-small-btn" (click)="addHighlight(i)">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                  </svg>
                  Add
                </button>
              </div>
              @for (hl of exp.highlights; track $index; let hi = $index) {
                <div class="highlight-row">
                  <span class="highlight-bullet"></span>
                  <input type="text" class="form-input highlight-input"
                    placeholder="Achieved X by doing Y resulting in Z..."
                    [ngModel]="hl"
                    (ngModelChange)="updateHighlight(i, hi, $event)" />
                  <button class="remove-small-btn" (click)="removeHighlight(i, hi)" title="Remove">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <line x1="18" y1="6" x2="6" y2="18"></line>
                      <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                  </button>
                </div>
              }
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
